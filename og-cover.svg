<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1020"/>
      <stop offset="1" stop-color="#1a2250"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#da251d"/>
      <stop offset="1" stop-color="#e11d48"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.85" cy="0.15" r="0.6">
      <stop offset="0" stop-color="#ffcd00" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#ffcd00" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Logo block -->
  <g transform="translate(80, 90)">
    <rect width="90" height="90" rx="22" fill="url(#accent)"/>
    <text x="45" y="68" font-family="Manrope, Arial, sans-serif" font-size="64" font-weight="800" fill="#fff" text-anchor="middle">₫</text>
    <text x="115" y="42" font-family="Manrope, Arial, sans-serif" font-size="32" font-weight="800" fill="#fff">VNCash</text>
    <text x="115" y="78" font-family="Manrope, Arial, sans-serif" font-size="28" font-weight="600" fill="#ffcd00">Vietnam</text>
  </g>

  <!-- Main heading -->
  <text x="80" y="280" font-family="Manrope, Arial, sans-serif" font-size="78" font-weight="800" fill="#fff">Обмен валют</text>
  <text x="80" y="370" font-family="Manrope, Arial, sans-serif" font-size="78" font-weight="800" fill="#fff">во <tspan fill="#ffcd00">Вьетнаме</tspan></text>

  <!-- Subheading -->
  <text x="80" y="430" font-family="Manrope, Arial, sans-serif" font-size="30" font-weight="500" fill="rgba(255,255,255,0.75)">RUB · CNY · USDT · USD → VND</text>

  <!-- Feature pills -->
  <g font-family="Manrope, Arial, sans-serif" font-size="22" font-weight="600">
    <g transform="translate(80, 490)">
      <rect width="260" height="56" rx="28" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.18)"/>
      <text x="130" y="36" fill="#fff" text-anchor="middle">🚗 Дананг · Нячанг</text>
    </g>
    <g transform="translate(360, 490)">
      <rect width="320" height="56" rx="28" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.18)"/>
      <text x="160" y="36" fill="#fff" text-anchor="middle">🏧 Банкомат · весь Вьетнам</text>
    </g>
    <g transform="translate(700, 490)">
      <rect width="220" height="56" rx="28" fill="url(#accent)"/>
      <text x="110" y="36" fill="#fff" text-anchor="middle">Лучший курс</text>
    </g>
  </g>

  <!-- Right side flag accent -->
  <g transform="translate(940, 130)" opacity="0.9">
    <circle cx="110" cy="110" r="110" fill="#da251d"/>
    <polygon fill="#ffcd00" points="110,40 125,95 185,95 137,128 155,185 110,152 65,185 83,128 35,95 95,95"/>
  </g>
</svg>
